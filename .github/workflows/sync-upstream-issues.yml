name: Sync Upstream Issues to Fork

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Sync issues from upstream
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const UPSTREAM_OWNER = 'MicrosoftLearning';
            const UPSTREAM_REPO = 'MS-4010-Extend-Microsoft365-Copilot-declarative-agents-VS-Code';
            const FORK_OWNER = context.repo.owner;
            const FORK_REPO = context.repo.repo;
            const SYNC_LABEL = 'upstream-sync';

            const upstreamIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: UPSTREAM_OWNER,
              repo: UPSTREAM_REPO,
              state: 'open',
              per_page: 100,
            });

            const openIssues = upstreamIssues.filter(i => !i.pull_request);
            console.log('Found ' + openIssues.length + ' open issues in upstream');

            const forkIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: FORK_OWNER,
              repo: FORK_REPO,
              state: 'open',
              labels: SYNC_LABEL,
              per_page: 100,
            });

            const syncedNumbers = new Set();
            for (const issue of forkIssues) {
              if (issue.body) {
                const match = issue.body.match(/Upstream issue:.*\/issues\/(\d+)/);
                if (match) syncedNumbers.add(parseInt(match[1]));
              }
            }

            console.log('Already synced: ' + ([...syncedNumbers].join(', ') || 'none'));

            try {
              await github.rest.issues.getLabel({
                owner: FORK_OWNER,
                repo: FORK_REPO,
                name: SYNC_LABEL,
              });
            } catch (e) {
              await github.rest.issues.createLabel({
                owner: FORK_OWNER,
                repo: FORK_REPO,
                name: SYNC_LABEL,
                color: '0075ca',
                description: 'Synced from upstream repository',
              });
              console.log('Created upstream-sync label');
            }

            let created = 0;
            for (const issue of openIssues) {
              if (syncedNumbers.has(issue.number)) continue;

              const upstreamUrl = 'https://github.com/' + UPSTREAM_OWNER + '/' + UPSTREAM_REPO + '/issues/' + issue.number;
              const createdDate = new Date(issue.created_at).toDateString();
              const issueBody = issue.body || 'No description provided.';
              const body = '> Upstream issue: [' + UPSTREAM_OWNER + '/' + UPSTREAM_REPO + '#' + issue.number + '](' + upstreamUrl + ')\n' +
                '> Opened by: @' + issue.user.login + '\n' +
                '> Created: ' + createdDate + '\n\n' +
                '---\n\n' +
                issueBody;

              const title = '[Upstream #' + issue.number + '] ' + issue.title;

              await github.rest.issues.create({
                owner: FORK_OWNER,
                repo: FORK_REPO,
                title: title,
                body: body,
                labels: [SYNC_LABEL],
                assignees: ['Desiderio25', 'copilot']
              });

              created++;
              console.log('Created issue for upstream #' + issue.number + ': ' + issue.title);

              await new Promise(r => setTimeout(r, 1000));
            }

            console.log('Done! Created ' + created + ' new issue(s).');
